<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Reader Manager</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; background: #f0f2f5; color: #1a1a2e; min-height: 100vh;
        }
        .card {
            background: white; padding: 28px; border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10); width: 100%;
            max-width: 460px; text-align: center; margin-bottom: 20px;
        }
        h2 { margin: 0 0 4px; color: #007AFF; font-size: 22px; }
        .subtitle { font-size: 13px; color: #888; margin-bottom: 20px; }

        button {
            background: #007AFF; color: white; border: none;
            padding: 13px 18px; border-radius: 10px; font-size: 14px;
            cursor: pointer; margin: 5px 0; width: 100%; font-weight: 600;
            transition: background 0.2s, opacity 0.2s;
        }
        button:hover:not(:disabled) { background: #0066DD; }
        button:disabled { background: #c8c8d0; cursor: not-allowed; }
        button.secondary { background: #5856D6; }
        button.secondary:hover:not(:disabled) { background: #4645b8; }
        button.danger {
            background: #FF3B30; padding: 6px 14px;
            width: auto; font-size: 12px; margin: 0;
        }
        button.danger:hover { background: #dd2b20; }

        .file-select-row {
            display: flex; gap: 8px; margin-bottom: 6px;
        }
        .file-select-row button { margin: 0; }
        #selectedFile {
            font-size: 12px; color: #555; text-align: left;
            background: #f4f4f9; padding: 8px 10px; border-radius: 8px;
            margin-bottom: 10px; min-height: 32px; word-break: break-all;
        }

        progress {
            width: 100%; height: 10px; margin-top: 14px;
            display: none; border-radius: 5px; overflow: hidden;
        }
        progress::-webkit-progress-bar { background: #eee; border-radius: 5px; }
        progress::-webkit-progress-value { background: #007AFF; border-radius: 5px; }

        #status {
            margin-top: 12px; font-weight: 600; font-size: 13px;
            color: #444; min-height: 20px;
        }
        .status-ok    { color: #34C759 !important; }
        .status-error { color: #FF3B30 !important; }
        .status-busy  { color: #FF9500 !important; }

        hr { border: none; border-top: 1px solid #eee; margin: 18px 0; }

        .file-list { text-align: left; display: none; }
        .file-list-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px;
        }
        .file-list-header h3 { margin: 0; font-size: 15px; color: #1a1a2e; }
        .file-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 6px; border-bottom: 1px solid #f0f0f5;
        }
        .file-info {
            font-size: 13px; font-weight: 500; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap; max-width: 270px;
        }
        .empty-msg { font-size: 13px; color: #aaa; padding: 12px 0; }

        #log {
            font-size: 11px; color: #777; margin-top: 14px; text-align: left;
            width: 100%; overflow-y: auto; max-height: 90px;
            background: #f4f4f9; padding: 10px; border-radius: 8px;
            font-family: monospace; line-height: 1.5;
        }

        .badge {
            display: inline-block; font-size: 10px; font-weight: 700;
            padding: 2px 7px; border-radius: 20px; margin-left: 6px;
            vertical-align: middle;
        }
        .badge-connected { background: #d4f5e2; color: #1a7a40; }
        .badge-disconnected { background: #f5d4d4; color: #7a1a1a; }
    </style>
</head>
<body>

<div class="card">
    <h2>📖 E-Reader Manager</h2>
    <p class="subtitle">Send EPUB books to your device over Bluetooth</p>

    <!-- ── Connect Section ──────────────────────────── -->
    <button id="bleConnectBtn">🔗 Connect to E-Reader</button>

    <progress id="progressBar" value="0" max="100"></progress>
    <div id="status">Status: Not connected
        <span id="connBadge" class="badge badge-disconnected">●</span>
    </div>

    <hr>

    <!-- ── Upload Section ───────────────────────────── -->
    <div class="file-select-row">
        <button id="selectBtn" style="flex:1">📂 Choose EPUB</button>
        <button id="uploadBtn" disabled style="flex:1">⬆ Upload</button>
    </div>
    <div id="selectedFile">No file selected</div>
    <input type="file" id="fileInput" accept=".epub" style="display:none">

    <hr>

    <!-- ── Management Section ───────────────────────── -->
    <button id="manageBtn" class="secondary">📚 Manage Library on Device</button>

    <div id="fileListSection" class="file-list">
        <div class="file-list-header">
            <h3>Books on Device</h3>
            <button id="refreshBtn" class="secondary"
                    style="width:auto;padding:6px 12px;font-size:12px">↻ Refresh</button>
        </div>
        <div id="fileContainer"></div>
    </div>

    <div id="log"></div>
</div>

<script>
// ── UUIDs (must match ESP32 firmware) ──────────────────────────────────────
const SERVICE_UUID     = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
const UPLOAD_CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
const LIST_CHAR_UUID   = "beb5483e-36e1-4688-b7f5-ea07361b26a9";
const DELETE_CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26aa";
const CHUNK_SIZE       = 512;   // bytes per BLE write — match ESP32 MTU

// ── State ──────────────────────────────────────────────────────────────────
let cleanText  = "";
let fileName   = "";
let bleDevice  = null;
let bleServer  = null;

// ── Helpers ────────────────────────────────────────────────────────────────
const logEl    = document.getElementById('log');
const statusEl = document.getElementById('status');
const badgeEl  = document.getElementById('connBadge');

function log(msg) {
    const ts = new Date().toLocaleTimeString();
    logEl.innerHTML += `<span style="color:#aaa">[${ts}]</span> ${msg}<br>`;
    logEl.scrollTop = logEl.scrollHeight;
}

function setStatus(msg, type = '') {
    statusEl.className = type ? `status-${type}` : '';
    statusEl.innerHTML = `Status: ${msg} `;
    statusEl.appendChild(badgeEl);
}

function setBadge(connected) {
    badgeEl.className = `badge badge-${connected ? 'connected' : 'disconnected'}`;
    badgeEl.textContent = connected ? '● Connected' : '● Disconnected';
}

// ── EPUB Parsing ───────────────────────────────────────────────────────────
document.getElementById('selectBtn').onclick = () =>
    document.getElementById('fileInput').click();

document.getElementById('fileInput').onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    document.getElementById('selectedFile').textContent = `📄 ${file.name}`;
    setStatus('Processing EPUB…', 'busy');
    log(`Parsing: ${file.name}`);

    try {
        const zip = await JSZip.loadAsync(file);

        // ── 1. Find the OPF file (via META-INF/container.xml or fallback scan) ──
        let opfEntry = null;
        const containerFile = zip.files['META-INF/container.xml'];
        if (containerFile) {
            const containerXml = await containerFile.async("string");
            const containerDoc = new DOMParser().parseFromString(containerXml, "text/xml");
            const rootfile = containerDoc.querySelector("rootfile");
            if (rootfile) opfEntry = rootfile.getAttribute("full-path");
        }
        if (!opfEntry) opfEntry = Object.keys(zip.files).find(n => n.endsWith('.opf'));

        let bookTitle  = file.name.replace(/\.epub$/i, '');  // fallback
        let bookAuthor = '';
        let spineOrder = [];   // array of { path, label } objects
        const base = opfEntry && opfEntry.includes('/')
            ? opfEntry.substring(0, opfEntry.lastIndexOf('/') + 1) : '';

        if (opfEntry && zip.files[opfEntry]) {
            const opfXml  = await zip.files[opfEntry].async("string");
            const parser  = new DOMParser();
            const opfDoc  = parser.parseFromString(opfXml, "text/xml");

            // ── 2. Extract title & author from Dublin Core metadata ──
            const dcTitle = opfDoc.querySelector(
                "metadata > title, metadata > *|title, dc\\:title");
            if (dcTitle && dcTitle.textContent.trim())
                bookTitle = dcTitle.textContent.trim();

            const dcCreator = opfDoc.querySelector(
                "metadata > creator, metadata > *|creator, dc\\:creator");
            if (dcCreator && dcCreator.textContent.trim())
                bookAuthor = dcCreator.textContent.trim();

            // ── 3. Build manifest id→href map ──
            const items = {};
            opfDoc.querySelectorAll("manifest item").forEach(el => {
                items[el.getAttribute("id")] = el.getAttribute("href");
            });

            // ── 4. Try to get chapter labels from NCX (EPUB2) ──
            const ncxLabels = {};  // href basename → label
            const ncxId  = opfDoc.querySelector("spine")?.getAttribute("toc");
            const ncxHref = ncxId ? items[ncxId] : null;
            const ncxPath = ncxHref ? base + ncxHref : Object.keys(zip.files).find(n => n.endsWith('.ncx'));
            if (ncxPath && zip.files[ncxPath]) {
                const ncxXml = await zip.files[ncxPath].async("string");
                const ncxDoc = new DOMParser().parseFromString(ncxXml, "text/xml");
                ncxDoc.querySelectorAll("navPoint").forEach(np => {
                    const label = np.querySelector("navLabel > text")?.textContent?.trim();
                    const src   = np.querySelector("content")?.getAttribute("src")?.split('#')[0];
                    if (label && src) {
                        const key = src.includes('/') ? src.substring(src.lastIndexOf('/') + 1) : src;
                        ncxLabels[key] = label;
                    }
                });
                log(`NCX: found ${Object.keys(ncxLabels).length} chapter labels`);
            }

            // ── 5. Try to get chapter labels from EPUB3 NAV document ──
            const navEntry = Object.keys(zip.files).find(n =>
                (n.endsWith('.xhtml') || n.endsWith('.html')) &&
                zip.files[n] && n.toLowerCase().includes('nav'));
            if (navEntry && zip.files[navEntry] && Object.keys(ncxLabels).length === 0) {
                const navHtml = await zip.files[navEntry].async("string");
                const navDoc  = new DOMParser().parseFromString(navHtml, 'text/html');
                navDoc.querySelectorAll('nav[epub\\:type="toc"] a, nav a').forEach(a => {
                    const label = a.textContent.trim();
                    const href  = a.getAttribute('href')?.split('#')[0];
                    if (label && href) {
                        const key = href.includes('/') ? href.substring(href.lastIndexOf('/') + 1) : href;
                        if (!ncxLabels[key]) ncxLabels[key] = label;
                    }
                });
                log(`NAV: found ${Object.keys(ncxLabels).length} chapter labels`);
            }

            // ── 6. Build spine with labels ──
            opfDoc.querySelectorAll("spine itemref").forEach(el => {
                const href = items[el.getAttribute("idref")];
                if (!href) return;
                const fullPath = base + href;
                const key = href.includes('/') ? href.substring(href.lastIndexOf('/') + 1) : href;
                spineOrder.push({ path: fullPath, label: ncxLabels[key] || null });
            });
        }

        // Fallback if spine is empty
        if (spineOrder.length === 0) {
            spineOrder = Object.keys(zip.files)
                .filter(fn => fn.endsWith('.xhtml') || fn.endsWith('.html'))
                .sort()
                .map(path => ({ path, label: null }));
        }

        // ── 7. Extract text, inserting chapter markers ──
        let text = "";
        let chapterCount = 0;
        for (const { path, label } of spineOrder) {
            const entry = zip.files[path] || zip.files[decodeURIComponent(path)];
            if (!entry) continue;
            const html  = await entry.async("string");
            const doc   = new DOMParser().parseFromString(html, 'text/html');
            doc.querySelectorAll('nav, script, style, head').forEach(el => el.remove());
            const bodyText = doc.body ? doc.body.textContent.trim() : "";
            if (!bodyText) continue;

            if (label) {
                chapterCount++;
                text += `\n\n=== ${label} ===\n\n`;
            }
            text += bodyText + "\n\n";
        }

        // Normalise whitespace
        cleanText = text.replace(/[ \t]+/g, ' ')
                        .replace(/\n{3,}/g, '\n\n')
                        .trim();

        // Use clean title as filename
        const safeTitle = bookTitle.replace(/[^a-zA-Z0-9 \-_]/g, '').trim() || 'book';
        fileName = safeTitle + '.txt';

        // Update UI with discovered metadata
        const authorStr = bookAuthor ? ` by ${bookAuthor}` : '';
        document.getElementById('selectedFile').innerHTML =
            `📖 <strong>${bookTitle}</strong>${authorStr}<br>` +
            `<span style="color:#aaa;font-size:11px">${file.name} · ${chapterCount} chapters · ${(cleanText.length/1024).toFixed(1)} KB</span>`;

        setStatus(`Ready — "${bookTitle}"`, 'ok');
        document.getElementById('uploadBtn').disabled = !bleDevice?.gatt?.connected;
        log(`Title: "${bookTitle}"${authorStr}`);
        log(`Chapters: ${chapterCount} · Characters: ${cleanText.length.toLocaleString()}`);
        log(`Will upload as: ${fileName}`);
    } catch (err) {
        log(`Error: ${err.message}`);
        setStatus('EPUB parsing failed', 'error');
    }
};

// ── BLE Connection ─────────────────────────────────────────────────────────
function updateConnectBtn(connected) {
    const btn = document.getElementById('bleConnectBtn');
    if (connected) {
        btn.textContent = '✕ Disconnect';
        btn.style.background = '#FF3B30';
    } else {
        btn.textContent = '🔗 Connect to E-Reader';
        btn.style.background = '';
    }
}

document.getElementById('bleConnectBtn').onclick = async () => {
    if (bleDevice?.gatt?.connected) {
        bleDevice.gatt.disconnect();
        return;
    }

    // ── Pre-flight diagnostics ──────────────────────────────────────────
    if (!window.isSecureContext) {
        log('❌ Page is not served over HTTPS. Web Bluetooth requires a secure context.');
        setStatus('HTTPS required', 'error');
        return;
    }
    if (!navigator.bluetooth) {
        log('❌ navigator.bluetooth is undefined.');
        log('   • If on Android+Chrome: go to Android Settings → Apps → Chrome → Permissions and enable "Nearby devices" and "Location".');
        log('   • Check chrome://flags and ensure Web Bluetooth is not Disabled.');
        setStatus('Web Bluetooth unavailable', 'error');
        return;
    }
    let btAvailable = false;
    try { btAvailable = await navigator.bluetooth.getAvailability(); } catch(e) {}
    if (!btAvailable) {
        log('❌ Bluetooth reports as unavailable on this device. Is Bluetooth turned on in Android quick settings?');
        setStatus('Bluetooth off or blocked', 'error');
        return;
    }
    log('✅ Pre-flight OK — opening device picker…');
    // ───────────────────────────────────────────────────────────────────

    await ensureConnected();
};

async function ensureConnected() {
    if (bleDevice?.gatt?.connected) return true;

    try {
        setStatus('Requesting device…', 'busy');
        bleDevice = await navigator.bluetooth.requestDevice({
            filters: [{ name: 'S3-Reader-BLE' }],
            optionalServices: [SERVICE_UUID]
        });

        bleDevice.addEventListener('gattserverdisconnected', () => {
            setStatus('Disconnected', 'error');
            setBadge(false);
            updateConnectBtn(false);
            document.getElementById('uploadBtn').disabled = true;
            document.getElementById('fileListSection').style.display = 'none';
            log('Device disconnected.');
        });

        setStatus('Connecting…', 'busy');
        bleServer = await bleDevice.gatt.connect();
        setBadge(true);
        updateConnectBtn(true);
        setStatus('Connected', 'ok');
        log('Connected to S3-Reader-BLE');
        if (cleanText) document.getElementById('uploadBtn').disabled = false;
        return true;
    } catch (err) {
        log(`Connection error: ${err.message}`);
        setStatus('Connection failed', 'error');
        setBadge(false);
        updateConnectBtn(false);
        return false;
    }
}

// ── Upload ─────────────────────────────────────────────────────────────────
document.getElementById('uploadBtn').onclick = async () => {
    if (!cleanText) { log('No EPUB loaded.'); return; }
    if (!await ensureConnected()) return;

    try {
        const service = await bleServer.getPrimaryService(SERVICE_UUID);
        const char    = await service.getCharacteristic(UPLOAD_CHAR_UUID);

        setStatus('Uploading…', 'busy');
        const prog = document.getElementById('progressBar');
        prog.style.display = 'block';
        prog.value = 0;

        // First chunk carries filename prefix: "name.txt|<text start>"
        const encoder = new TextEncoder();
        const prefix  = encoder.encode(fileName + "|");
        const body    = encoder.encode(cleanText);

        // Merge into one Uint8Array
        const combined = new Uint8Array(prefix.length + body.length);
        combined.set(prefix, 0);
        combined.set(body, prefix.length);

        const total = combined.length;
        for (let i = 0; i < total; i += CHUNK_SIZE) {
            const chunk = combined.slice(i, i + CHUNK_SIZE);
            await char.writeValue(chunk);
            prog.value = Math.round(((i + chunk.length) / total) * 100);
            // Small yield to keep UI alive
            if (i % (CHUNK_SIZE * 20) === 0) await new Promise(r => setTimeout(r, 10));
        }

        setStatus('Upload complete! ✓', 'ok');
        log(`Sent "${fileName}" (${(total/1024).toFixed(1)} KB)`);
        prog.value = 100;
        setTimeout(() => { prog.style.display = 'none'; }, 2000);
    } catch (err) {
        log(`Upload error: ${err.message}`);
        setStatus('Upload failed', 'error');
    }
};

// ── Library Management ─────────────────────────────────────────────────────
async function fetchFiles() {
    if (!await ensureConnected()) return;

    try {
        setStatus('Fetching library…', 'busy');
        const service = await bleServer.getPrimaryService(SERVICE_UUID);
        const char    = await service.getCharacteristic(LIST_CHAR_UUID);

        const value   = await char.readValue();
        const list    = new TextDecoder().decode(value);

        const container = document.getElementById('fileContainer');
        container.innerHTML = '';
        document.getElementById('fileListSection').style.display = 'block';

        if (!list.trim()) {
            container.innerHTML = '<p class="empty-msg">No books found on device.</p>';
            setStatus('Library empty', '');
            return;
        }

        const files = list.split(',').filter(Boolean);
        files.forEach(title => {
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerHTML = `
                <div class="file-info">📖 ${title}</div>
                <button class="danger" data-title="${title}">Delete</button>
            `;
            item.querySelector('.danger').onclick = () => deleteFile(title);
            container.appendChild(item);
        });

        setStatus(`${files.length} book${files.length !== 1 ? 's' : ''} on device`, 'ok');
        log(`Found ${files.length} book(s).`);
    } catch (err) {
        log(`Fetch error: ${err.message}`);
        setStatus('Fetch failed', 'error');
    }
}

async function deleteFile(title) {
    if (!confirm(`Delete "${title}" from the device?`)) return;

    try {
        setStatus(`Deleting "${title}"…`, 'busy');
        const service = await bleServer.getPrimaryService(SERVICE_UUID);
        const char    = await service.getCharacteristic(DELETE_CHAR_UUID);
        await char.writeValue(new TextEncoder().encode(title));
        log(`Deleted: ${title}`);
        await new Promise(r => setTimeout(r, 300));
        fetchFiles();
    } catch (err) {
        log(`Delete error: ${err.message}`);
        setStatus('Delete failed', 'error');
    }
}

document.getElementById('manageBtn').onclick  = fetchFiles;
document.getElementById('refreshBtn').onclick = fetchFiles;
</script>
</body>
</html>
