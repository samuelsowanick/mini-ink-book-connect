<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='22' width='24' height='5' rx='1.5' fill='%2300b284'/%3E%3Crect x='6' y='15' width='20' height='5' rx='1.5' fill='%23008f69'/%3E%3Crect x='9' y='8' width='14' height='5' rx='1.5' fill='%2300b284'/%3E%3Crect x='4' y='22' width='24' height='5' rx='1.5' fill='none' stroke='%23ffffff22' stroke-width='0.5'/%3E%3Crect x='6' y='15' width='20' height='5' rx='1.5' fill='none' stroke='%23ffffff22' stroke-width='0.5'/%3E%3Crect x='9' y='8' width='14' height='5' rx='1.5' fill='none' stroke='%23ffffff22' stroke-width='0.5'/%3E%3C/svg%3E">
    <title>Mini InkBook Manager</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink:        #1c1c1c;
            --ink-mid:    #4a4a4a;
            --ink-light:  #767676;
            --border:     #d8d8d8;
            --bg:         #f5f4f0;
            --surface:    #ffffff;
            --accent:     #00b284;
            --accent-dk:  #008f69;
            --warn:       #e05c00;
            --danger:     #c0392b;
            --disabled:   #b8b8b8;
            --radius:     4px;
            --font-head:  'Montserrat', sans-serif;
            --font-body:  'Source Sans 3', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-body);
            font-size: 15px;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
        }

        .topbar {
            background: var(--ink);
            padding: 0 24px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .topbar-brand {
            font-family: var(--font-head);
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: #ffffff;
            text-transform: uppercase;
        }
        .topbar-brand span { color: var(--accent); }

        .conn-pill {
            font-family: var(--font-head);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1.5px solid;
            transition: all 0.2s;
        }
        .conn-pill.disconnected { color: #888; border-color: #555; }
        .conn-pill.connected    { color: var(--accent); border-color: var(--accent); }

        .page {
            max-width: 560px;
            margin: 0 auto;
            padding: 32px 20px 60px;
        }
        .page-title {
            font-family: var(--font-head);
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--ink);
            margin-bottom: 4px;
        }
        .page-sub {
            font-size: 13px;
            color: var(--ink-light);
            font-weight: 300;
            margin-bottom: 28px;
        }

        .section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 16px;
            overflow: hidden;
        }
        .section-header {
            padding: 14px 20px 12px;
            border-bottom: 1px solid var(--border);
        }
        .section-label {
            font-family: var(--font-head);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-light);
        }
        .section-body { padding: 20px; }

        .status-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--disabled);
            flex-shrink: 0;
            transition: background 0.3s;
        }
        .status-dot.ok    { background: var(--accent); }
        .status-dot.error { background: var(--danger); }
        .status-dot.busy  { background: var(--warn); animation: pulse 1s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
        }
        .status-text { font-size: 13px; color: var(--ink-mid); }

        .btn {
            font-family: var(--font-head);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 11px 20px;
            border-radius: var(--radius);
            border: none;
            cursor: pointer;
            transition: background 0.15s, opacity 0.15s, transform 0.1s;
            display: inline-block;
            line-height: 1;
        }
        .btn:active:not(:disabled) { transform: scale(0.98); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-primary { background: var(--accent); color: #fff; width: 100%; padding: 13px 20px; }
        .btn-primary:hover:not(:disabled) { background: var(--accent-dk); }

        .btn-disconnect { background: #2a1414; color: #ff8a80; width: 100%; padding: 13px 20px; }
        .btn-disconnect:hover:not(:disabled) { background: #3d1a1a; }

        .btn-outline {
            background: transparent;
            color: var(--ink);
            border: 1.5px solid var(--border);
            width: 100%;
            padding: 11px 20px;
        }
        .btn-outline:hover:not(:disabled) { border-color: var(--ink); background: rgba(0,0,0,0.03); }

        .btn-ghost {
            background: transparent;
            color: var(--ink-light);
            border: 1.5px solid var(--border);
            font-size: 11px;
            padding: 7px 12px;
        }
        .btn-ghost:hover:not(:disabled) { border-color: var(--ink-mid); color: var(--ink); }

        .btn-row { display: flex; gap: 10px; }
        .btn-row .btn { flex: 1; }

        .file-info-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 14px;
            margin: 12px 0 0;
            min-height: 46px;
        }
        .file-info-box .file-title {
            font-family: var(--font-head);
            font-size: 13px;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 3px;
        }
        .file-info-box .file-meta { font-size: 11px; color: var(--ink-light); font-weight: 300; }
        .file-info-box .file-placeholder { font-size: 12px; color: var(--ink-light); }

        .progress-wrap { margin-top: 14px; display: none; }
        .progress-label {
            font-size: 11px;
            color: var(--ink-light);
            font-family: var(--font-head);
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }
        progress {
            width: 100%; height: 4px;
            border: none; border-radius: 2px;
            background: var(--border);
            appearance: none; -webkit-appearance: none;
        }
        progress::-webkit-progress-bar   { background: var(--border); border-radius: 2px; }
        progress::-webkit-progress-value { background: var(--accent); border-radius: 2px; }
        progress::-moz-progress-bar      { background: var(--accent); border-radius: 2px; }

        .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

        .book-list { display: none; }
        .book-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .book-list-title {
            font-family: var(--font-head);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ink-mid);
        }
        .book-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .book-item:last-child { border-bottom: none; }
        .book-item-title { font-size: 14px; font-weight: 400; color: var(--ink); }
        .btn-delete {
            font-family: var(--font-head);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            background: transparent;
            color: var(--danger);
            border: 1.5px solid var(--danger);
            padding: 5px 10px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            flex-shrink: 0;
        }
        .btn-delete:hover { background: var(--danger); color: #fff; }
        .empty-msg {
            font-size: 13px;
            color: var(--ink-light);
            text-align: center;
            padding: 20px 0;
            font-weight: 300;
        }

        details { margin-top: 16px; }
        summary {
            font-family: var(--font-head);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-light);
            cursor: pointer;
            user-select: none;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        summary::-webkit-details-marker { display: none; }
        summary::before {
            content: '';
            display: inline-block;
            width: 6px; height: 6px;
            border-right: 1.5px solid var(--ink-light);
            border-bottom: 1.5px solid var(--ink-light);
            transform: rotate(-45deg);
            transition: transform 0.2s;
            position: relative; top: -1px;
        }
        details[open] summary::before { transform: rotate(45deg); top: -3px; }
        summary:hover { color: var(--ink); }
        summary:hover::before { border-color: var(--ink); }

        #log {
            margin-top: 10px;
            overflow-y: auto;
            max-height: 160px;
            background: #1a1a1a;
            color: #aaa;
            padding: 12px 14px;
            border-radius: var(--radius);
            font-family: 'Courier New', monospace;
            font-size: 11px;
            line-height: 1.7;
        }
        #log .ts   { color: #444; }
        #log .ok   { color: #00b284; }
        #log .err  { color: #ff6b6b; }
        #log .warn { color: #ffaa55; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-brand">Mini <span>Ink</span>Book</div>
    <div id="connPill" class="conn-pill disconnected">Not connected</div>
</div>

<div class="page">
    <h1 class="page-title">Device Manager</h1>
    <p class="page-sub">Transfer EPUB books to your e-ink reader via Bluetooth</p>

    <div class="section">
        <div class="section-header">
            <div class="section-label">Bluetooth Connection</div>
        </div>
        <div class="section-body">
            <div class="status-row">
                <div id="statusDot" class="status-dot"></div>
                <div id="statusText" class="status-text">Not connected</div>
            </div>
            <button id="bleConnectBtn" class="btn btn-primary">Connect to Device</button>
        </div>
    </div>

    <div class="section">
        <div class="section-header">
            <div class="section-label">Send Book</div>
        </div>
        <div class="section-body">
            <div class="btn-row">
                <button id="selectBtn" class="btn btn-outline">Choose EPUB</button>
                <button id="uploadBtn" class="btn btn-primary" disabled>Send to Device</button>
            </div>
            <input type="file" id="fileInput" accept=".epub" style="display:none">
            <div class="file-info-box" id="fileInfoBox">
                <span class="file-placeholder">No file selected</span>
            </div>
            <div class="progress-wrap" id="progressWrap">
                <div class="progress-label">
                    <span>Uploading</span>
                    <span id="progressPct">0%</span>
                </div>
                <progress id="progressBar" value="0" max="100"></progress>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-header">
            <div class="section-label">Device Library</div>
        </div>
        <div class="section-body">
            <button id="manageBtn" class="btn btn-outline">Load Books from Device</button>
            <div class="book-list" id="fileListSection">
                <hr class="divider">
                <div class="book-list-header">
                    <span class="book-list-title">Books on device</span>
                    <button id="refreshBtn" class="btn btn-ghost">Refresh</button>
                </div>
                <div id="fileContainer"></div>
            </div>
        </div>
    </div>

    <details>
        <summary>Diagnostics log</summary>
        <div id="log"></div>
    </details>
</div>

<script>
const SERVICE_UUID     = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
const UPLOAD_CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
const LIST_CHAR_UUID   = "beb5483e-36e1-4688-b7f5-ea07361b26a9";
const DELETE_CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26aa";
const CHUNK_SIZE       = 512;

// ── Chapter marker format ──────────────────────────────────────────────────
// Format: \n=== Title ===\n
// Arduino detects lines that start AND end with === and extracts the title.
const CHAPTER_PREFIX = "===";
const CHAPTER_SUFFIX = "===";

let cleanText = "";
let fileName  = "";
let bleDevice = null;
let bleServer = null;

const logEl      = document.getElementById('log');
const statusDot  = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const connPill   = document.getElementById('connPill');

function log(msg, type = '') {
    const ts  = new Date().toLocaleTimeString();
    const cls = type ? ` class="${type}"` : '';
    logEl.innerHTML += `<span class="ts">[${ts}]</span><span${cls}> ${msg}</span><br>`;
    logEl.scrollTop  = logEl.scrollHeight;
}

function setStatus(msg, type = '') {
    statusText.textContent = msg;
    statusDot.className    = 'status-dot' + (type ? ` ${type}` : '');
}

function setConnected(connected) {
    connPill.textContent = connected ? 'Connected' : 'Not connected';
    connPill.className   = `conn-pill ${connected ? 'connected' : 'disconnected'}`;
    const btn = document.getElementById('bleConnectBtn');
    btn.textContent = connected ? 'Disconnect' : 'Connect to Device';
    btn.className   = connected ? 'btn btn-disconnect' : 'btn btn-primary';
}

// ── Helpers ────────────────────────────────────────────────────────────────

function resolvePath(base, href) {
    if (!href) return '';
    href = href.split('#')[0];
    if (!href) return '';
    if (href.startsWith('/')) return href.slice(1);
    const parts = (base + href).split('/');
    const resolved = [];
    for (const part of parts) {
        if (part === '..') resolved.pop();
        else if (part !== '.') resolved.push(part);
    }
    return resolved.join('/');
}

function zipEntry(zip, path) {
    if (!path) return null;
    if (zip.files[path]) return zip.files[path];
    const decoded = decodeURIComponent(path);
    if (zip.files[decoded]) return zip.files[decoded];
    const lower = path.toLowerCase();
    const lowerDecoded = decoded.toLowerCase();
    for (const key of Object.keys(zip.files)) {
        if (key.toLowerCase() === lower || key.toLowerCase() === lowerDecoded)
            return zip.files[key];
    }
    return null;
}

function getDCMeta(opfDoc, localName) {
    const selectors = [`dc\\:${localName}`, `${localName}`, `*|${localName}`];
    for (const sel of selectors) {
        try {
            const el = opfDoc.querySelector(sel);
            if (el?.textContent?.trim()) return el.textContent.trim();
        } catch(e) {}
    }
    for (const el of opfDoc.getElementsByTagName('*')) {
        if (el.localName === localName) {
            const txt = el.textContent?.trim();
            if (txt) return txt;
        }
    }
    return '';
}

function dirOf(path) {
    if (!path || !path.includes('/')) return '';
    return path.substring(0, path.lastIndexOf('/') + 1);
}

// ── Sanitise a string to plain ASCII ──────────────────────────────────────
// Call this on CONTENT TEXT ONLY — never on chapter markers.
function toAscii(str) {
    return str
        .replace(/[\u2018\u2019\u201A\u201B\u2032\u2035]/g, "'")
        .replace(/[\u201C\u201D\u201E\u201F\u2033\u2036]/g, '"')
        .replace(/[\u2013\u2014\u2015]/g, '--').replace(/\u2012/g, '-')
        .replace(/\u2026/g, '...')
        .replace(/[\u00A0\u202F\u2007\u2009\u200A]/g, ' ')
        .replace(/[\u2022\u2023\u2043\u204C\u204D]/g, '*')
        .replace(/\u2044/g, '/').replace(/[\u2039\u203A]/g, m => m === '\u2039' ? '<' : '>')
        .replace(/\uFB00/g,'ff').replace(/\uFB01/g,'fi').replace(/\uFB02/g,'fl')
        .replace(/\uFB03/g,'ffi').replace(/\uFB04/g,'ffl')
        .replace(/[àáâãäåāăą]/g,'a').replace(/[ÀÁÂÃÄÅĀĂĄ]/g,'A')
        .replace(/[èéêëēĕęě]/g,'e').replace(/[ÈÉÊËĒĔĘĚ]/g,'E')
        .replace(/[ìíîïīĭįı]/g,'i').replace(/[ÌÍÎÏĪĬĮ]/g,'I')
        .replace(/[òóôõöøōŏő]/g,'o').replace(/[ÒÓÔÕÖØŌŎŐ]/g,'O')
        .replace(/[ùúûüūŭůű]/g,'u').replace(/[ÙÚÛÜŪŬŮŰ]/g,'U')
        .replace(/[ýÿ]/g,'y').replace(/[ÝŸ]/g,'Y').replace(/[ñ]/g,'n').replace(/[Ñ]/g,'N')
        .replace(/[çćĉċč]/g,'c').replace(/[ÇĆĈĊČ]/g,'C')
        .replace(/[ß]/g,'ss').replace(/[æ]/g,'ae').replace(/[Æ]/g,'AE')
        .replace(/[œ]/g,'oe').replace(/[Œ]/g,'OE')
        .replace(/[ð]/g,'d').replace(/[Ð]/g,'D').replace(/[þ]/g,'th').replace(/[Þ]/g,'Th')
        .replace(/[\u200B\u200C\u200D\uFEFF]/g,'')
        .replace(/[^\x09\x0A\x20-\x7E]/g,'');
}

// ── Build a chapter marker line (pure ASCII, no sanitisation needed) ───────
// Produces exactly: \n=== Title ===\n
// Title is sanitised to ASCII before embedding so the marker line stays clean.
function makeChapterMarker(title) {
    // Sanitise the title itself, then strip any stray = or | that could confuse the parser
    const safeTitle = toAscii(title).replace(/[=|]/g, '-').replace(/[ \t]+/g, ' ').trim();
    return `\n${CHAPTER_PREFIX} ${safeTitle} ${CHAPTER_SUFFIX}\n`;
}

// ── EPUB Parsing ───────────────────────────────────────────────────────────
document.getElementById('selectBtn').onclick = () =>
    document.getElementById('fileInput').click();

document.getElementById('fileInput').onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    document.getElementById('fileInfoBox').innerHTML =
        `<span class="file-placeholder">Processing ${file.name}...</span>`;
    setStatus('Processing EPUB...', 'busy');
    log(`Parsing: ${file.name}`);

    try {
        const zip = await JSZip.loadAsync(file);

        // ── 1. Find OPF path ──────────────────────────────────────────────
        let opfPath = null;
        const containerEntry = zipEntry(zip, 'META-INF/container.xml');
        if (containerEntry) {
            const containerXml = await containerEntry.async("string");
            const containerDoc = new DOMParser().parseFromString(containerXml, "text/xml");
            const rootfile = containerDoc.querySelector("rootfile");
            if (rootfile) opfPath = rootfile.getAttribute("full-path");
        }
        if (!opfPath)
            opfPath = Object.keys(zip.files).find(n => n.endsWith('.opf')) || null;

        const base = dirOf(opfPath);
        log(`OPF: ${opfPath || 'not found'}, base: "${base}"`);

        let bookTitle  = file.name.replace(/\.epub$/i, '');
        let bookAuthor = '';
        let spineOrder = [];

        if (opfPath) {
            const opfEntry = zipEntry(zip, opfPath);
            if (!opfEntry) throw new Error(`OPF file not found in zip: ${opfPath}`);
            const opfXml = await opfEntry.async("string");
            const opfDoc = new DOMParser().parseFromString(opfXml, "text/xml");

            // ── 2. Metadata ───────────────────────────────────────────────
            const t = getDCMeta(opfDoc, 'title');
            if (t) bookTitle = t;
            const c = getDCMeta(opfDoc, 'creator');
            if (c) bookAuthor = c;

            // ── 3. Manifest ───────────────────────────────────────────────
            const manifestById = {};
            opfDoc.querySelectorAll("manifest item").forEach(el => {
                const id   = el.getAttribute("id");
                const href = el.getAttribute("href");
                if (id && href) manifestById[id] = resolvePath(base, href);
            });
            log(`Manifest: ${Object.keys(manifestById).length} items`);

            // ── 4. NCX chapter labels ─────────────────────────────────────
            const ncxLabels = {};  // absolute zip path => label string

            const spineEl  = opfDoc.querySelector("spine");
            const ncxId    = spineEl?.getAttribute("toc");
            let ncxAbsPath = (ncxId && manifestById[ncxId]) ? manifestById[ncxId] : null;
            if (!ncxAbsPath)
                ncxAbsPath = Object.keys(zip.files).find(n => n.endsWith('.ncx')) || null;

            if (ncxAbsPath) {
                const ncxEntry = zipEntry(zip, ncxAbsPath);
                if (ncxEntry) {
                    const ncxXml = await ncxEntry.async("string");
                    const ncxDoc = new DOMParser().parseFromString(ncxXml, "text/xml");
                    const ncxBase = dirOf(ncxAbsPath);
                    ncxDoc.querySelectorAll("navPoint").forEach(np => {
                        const label = np.querySelector("navLabel > text")?.textContent?.trim();
                        const src   = np.querySelector("content")?.getAttribute("src");
                        if (label && src) {
                            const absPath = resolvePath(ncxBase, src.split('#')[0]);
                            if (!ncxLabels[absPath]) ncxLabels[absPath] = label;
                        }
                    });
                    log(`NCX: ${Object.keys(ncxLabels).length} labels (base: "${ncxBase}")`);
                }
            }

            // ── 5. EPUB3 nav fallback ─────────────────────────────────────
            if (Object.keys(ncxLabels).length === 0) {
                let navAbsPath = null;
                opfDoc.querySelectorAll("manifest item").forEach(el => {
                    if (el.getAttribute("properties")?.includes('nav')) {
                        const href = el.getAttribute("href");
                        if (href) navAbsPath = resolvePath(base, href);
                    }
                });
                if (!navAbsPath)
                    navAbsPath = Object.keys(zip.files).find(n =>
                        (n.endsWith('.xhtml') || n.endsWith('.html')) &&
                        n.toLowerCase().includes('nav')
                    ) || null;

                if (navAbsPath) {
                    const navEntry = zipEntry(zip, navAbsPath);
                    if (navEntry) {
                        const navHtml = await navEntry.async("string");
                        const navDoc  = new DOMParser().parseFromString(navHtml, 'text/html');
                        const navBase = dirOf(navAbsPath);
                        navDoc.querySelectorAll('nav[epub\\:type="toc"] a, nav a').forEach(a => {
                            const label = a.textContent.trim();
                            const href  = a.getAttribute('href');
                            if (label && href) {
                                const absPath = resolvePath(navBase, href.split('#')[0]);
                                if (!ncxLabels[absPath]) ncxLabels[absPath] = label;
                            }
                        });
                        log(`NAV: ${Object.keys(ncxLabels).length} labels (base: "${navBase}")`);
                    }
                }
            }

            // ── 6. Spine order ────────────────────────────────────────────
            const allSpineItems    = [];
            const linearSpineItems = [];
            opfDoc.querySelectorAll("spine itemref").forEach(el => {
                const idref   = el.getAttribute("idref");
                const linear  = el.getAttribute("linear");
                const absPath = manifestById[idref];
                if (!absPath) return;
                const item = { path: absPath, label: ncxLabels[absPath] || null };
                allSpineItems.push(item);
                if (linear !== 'no') linearSpineItems.push(item);
            });
            spineOrder = linearSpineItems.length > 0 ? linearSpineItems : allSpineItems;
            log(`Spine: ${spineOrder.length} items (${allSpineItems.length - linearSpineItems.length} non-linear skipped)`);
        }

        // ── 7. Fallback spine ─────────────────────────────────────────────
        if (spineOrder.length === 0) {
            const NON_CONTENT = /\b(nav|toc|cover|copyright|title-page|colophon)\b/i;
            spineOrder = Object.keys(zip.files)
                .filter(fn =>
                    (fn.endsWith('.xhtml') || fn.endsWith('.html')) &&
                    !NON_CONTENT.test(fn)
                )
                .sort()
                .map(path => ({ path, label: null }));
            log(`Fallback spine: ${spineOrder.length} files`, 'warn');
        }

        // ── 8. Extract plain text from each spine doc ─────────────────────
        const BLOCK_TAGS = new Set([
            'P','DIV','H1','H2','H3','H4','H5','H6',
            'LI','TR','TD','TH','BLOCKQUOTE','PRE',
            'SECTION','ARTICLE','HEADER','FOOTER','ASIDE',
            'BR','HR','DT','DD','FIGURE','FIGCAPTION'
        ]);

        function extractText(node) {
            if (node.nodeType === Node.TEXT_NODE) return node.textContent;
            if (node.nodeType !== Node.ELEMENT_NODE) return '';
            const tag = node.tagName?.toUpperCase();
            if (['SCRIPT','STYLE','HEAD','NAV','ASIDE'].includes(tag)) return '';
            let result = '';
            for (const child of node.childNodes) result += extractText(child);
            return BLOCK_TAGS.has(tag) ? '\n' + result.trim() + '\n' : result;
        }

        // ── KEY FIX: build parts array, sanitise content text separately ──
        // Chapter markers are kept pristine as ASCII strings and never run
        // through whitespace-collapsing regexes together with body text.
        const parts = [];   // alternating: marker string | content string
        let labelledChapters = 0;
        let headingChapters  = 0;
        let docsWithText     = 0;
        let skippedCount     = 0;

        for (const { path, label } of spineOrder) {
            const entry = zipEntry(zip, path);
            if (!entry) {
                log(`  Skipped (not in zip): ${path}`, 'warn');
                skippedCount++;
                continue;
            }
            const html     = await entry.async("string");
            const doc      = new DOMParser().parseFromString(html, 'text/html');
            const bodyText = doc.body ? extractText(doc.body).trim() : "";
            if (!bodyText) continue;
            docsWithText++;

            // Determine chapter label ──────────────────────────────────────
            let chapterLabel = null;
            if (label) {
                // Explicit NCX/NAV label — highest priority
                chapterLabel = label;
                labelledChapters++;
            } else {
                // Fallback: first h1/h2/h3 heading in the document
                const heading = doc.body?.querySelector('h1, h2, h3');
                const headingText = heading?.textContent?.trim();
                if (headingText) {
                    chapterLabel = headingText;
                    headingChapters++;
                }
            }

            // Push chapter marker FIRST, then sanitised content text ───────
            if (chapterLabel) {
                // makeChapterMarker returns a clean ASCII string with its own \n padding
                parts.push(makeChapterMarker(chapterLabel));
            }

            // Sanitise body text: normalise whitespace, then convert to ASCII
            const normalised = bodyText
                .replace(/[ \t]+/g, ' ')
                .replace(/\n{3,}/g, '\n\n');
            parts.push(toAscii(normalised));
        }

        // ── 9. Assemble final text ────────────────────────────────────────
        // Join parts with a single newline. Each chapter marker already has
        // its own leading/trailing \n, so sections are visually separated.
        const assembled = parts.join('\n').replace(/\n{3,}/g, '\n\n').trim();

        // ── 10. Sanity-check: count actual markers in final output ─────────
        const markerMatches = (assembled.match(/===[^=][^=\n]+===/g) || []).length;
        const chapterCount  = labelledChapters > 0 ? labelledChapters
            : headingChapters > 0 ? headingChapters
            : docsWithText;
        const chapterSource = labelledChapters > 0 ? 'NCX/NAV'
            : headingChapters > 0 ? 'headings'
            : 'spine docs';

        log(`Chapters found: ${chapterCount} (${chapterSource})`);
        log(`Markers in output: ${markerMatches}`, markerMatches === chapterCount ? 'ok' : 'warn');
        log(`Docs with text: ${docsWithText}`);
        if (skippedCount > 0) log(`Skipped ${skippedCount} spine items not in zip`, 'warn');

        cleanText = assembled;

        // Debug: log first marker found so you can verify format
        const firstMarker = assembled.match(/===[^\n]*/);
        if (firstMarker) log(`First marker: "${firstMarker[0]}"`, 'ok');
        else log('WARNING: No chapter markers found in output!', 'warn');

        const safeTitle = toAscii(bookTitle).replace(/[^a-zA-Z0-9 \-_]/g,'').trim() || 'book';
        fileName = safeTitle + '.txt';

        document.getElementById('fileInfoBox').innerHTML =
            `<div class="file-title">${bookTitle}</div>` +
            `<div class="file-meta">${bookAuthor ? bookAuthor + ' &middot; ' : ''}${chapterCount} chapters &middot; ${(cleanText.length/1024).toFixed(1)} KB</div>`;

        setStatus('Ready to send', 'ok');
        document.getElementById('uploadBtn').disabled = !bleDevice?.gatt?.connected;
        log(`Title: "${bookTitle}"${bookAuthor ? ' by ' + bookAuthor : ''}`, 'ok');
        log(`${chapterCount} chapters, ${cleanText.length.toLocaleString()} chars`);
        log(`Sending as: ${fileName}`);

    } catch (err) {
        log(`Parse error: ${err.message}`, 'err');
        console.error(err);
        setStatus('EPUB parsing failed', 'error');
        document.getElementById('fileInfoBox').innerHTML =
            `<span class="file-placeholder">Error reading file — check log</span>`;
    }
};

// ── BLE Connection ─────────────────────────────────────────────────────────
document.getElementById('bleConnectBtn').onclick = async () => {
    if (bleDevice?.gatt?.connected) { bleDevice.gatt.disconnect(); return; }
    if (!window.isSecureContext) {
        log('Page must be served over HTTPS for Web Bluetooth.', 'err');
        setStatus('HTTPS required', 'error'); return;
    }
    if (!navigator.bluetooth) {
        log('Web Bluetooth unavailable.', 'err');
        setStatus('Bluetooth unavailable', 'error'); return;
    }
    let btAvailable = false;
    try { btAvailable = await navigator.bluetooth.getAvailability(); } catch(e) {}
    if (!btAvailable) {
        log('Bluetooth is off or blocked.', 'err');
        setStatus('Bluetooth off', 'error'); return;
    }
    log('Pre-flight OK — opening device picker...');
    await ensureConnected();
};

async function ensureConnected() {
    if (bleDevice?.gatt?.connected) return true;
    try {
        setStatus('Searching for device...', 'busy');
        bleDevice = await navigator.bluetooth.requestDevice({
            filters: [{ name: 'MiniInkBook' }],
            optionalServices: [SERVICE_UUID]
        });
        bleDevice.addEventListener('gattserverdisconnected', () => {
            setStatus('Disconnected', 'error');
            setConnected(false);
            document.getElementById('uploadBtn').disabled = true;
            document.getElementById('fileListSection').style.display = 'none';
            log('Device disconnected.', 'warn');
        });
        setStatus('Connecting...', 'busy');
        bleServer = await bleDevice.gatt.connect();
        setConnected(true);
        setStatus('Connected to S3-Reader-BLE', 'ok');
        log('Connected to S3-Reader-BLE', 'ok');
        if (cleanText) document.getElementById('uploadBtn').disabled = false;
        return true;
    } catch (err) {
        log(`Connection failed: ${err.message}`, 'err');
        setStatus('Connection failed', 'error');
        setConnected(false);
        return false;
    }
}

// ── Upload ─────────────────────────────────────────────────────────────────
document.getElementById('uploadBtn').onclick = async () => {
    if (!cleanText) { log('No EPUB loaded.', 'warn'); return; }
    if (!await ensureConnected()) return;
    try {
        const service = await bleServer.getPrimaryService(SERVICE_UUID);
        const char    = await service.getCharacteristic(UPLOAD_CHAR_UUID);

        setStatus('Uploading...', 'busy');
        const wrap = document.getElementById('progressWrap');
        const prog = document.getElementById('progressBar');
        const pct  = document.getElementById('progressPct');
        wrap.style.display = 'block';
        prog.value = 0;

        const encoder  = new TextEncoder();
        const prefix   = encoder.encode(fileName + "|");
        const body     = encoder.encode(cleanText);
        const combined = new Uint8Array(prefix.length + body.length);
        combined.set(prefix, 0);
        combined.set(body, prefix.length);

        const total = combined.length;
        for (let i = 0; i < total; i += CHUNK_SIZE) {
            const chunk = combined.slice(i, i + CHUNK_SIZE);
            await char.writeValue(chunk);
            const p = Math.round(((i + chunk.length) / total) * 100);
            prog.value = p; pct.textContent = p + '%';
            if (i % (CHUNK_SIZE * 20) === 0) await new Promise(r => setTimeout(r, 10));
        }

        setStatus('Transfer complete', 'ok');
        log(`Sent "${fileName}" (${(total/1024).toFixed(1)} KB)`, 'ok');
        prog.value = 100; pct.textContent = '100%';
        setTimeout(() => { wrap.style.display = 'none'; }, 3000);
    } catch (err) {
        log(`Upload failed: ${err.message}`, 'err');
        setStatus('Upload failed', 'error');
    }
};

// ── Library Management ─────────────────────────────────────────────────────
async function fetchFiles() {
    if (!await ensureConnected()) return;
    try {
        setStatus('Loading library...', 'busy');
        const service = await bleServer.getPrimaryService(SERVICE_UUID);
        const char    = await service.getCharacteristic(LIST_CHAR_UUID);
        const value   = await char.readValue();
        const list    = new TextDecoder().decode(value);

        const container = document.getElementById('fileContainer');
        container.innerHTML = '';
        document.getElementById('fileListSection').style.display = 'block';

        if (!list.trim()) {
            container.innerHTML = '<p class="empty-msg">No books on device</p>';
            setStatus('Library empty', '');
            return;
        }

        const files = list.split(',').filter(Boolean);
        files.forEach(title => {
            const item = document.createElement('div');
            item.className = 'book-item';
            item.innerHTML = `
                <div class="book-item-title">${title}</div>
                <button class="btn-delete" data-title="${title}">Remove</button>
            `;
            item.querySelector('.btn-delete').onclick = () => deleteFile(title);
            container.appendChild(item);
        });

        setStatus(`${files.length} book${files.length !== 1 ? 's' : ''} on device`, 'ok');
        log(`Library: ${files.length} book(s)`, 'ok');
    } catch (err) {
        log(`Library fetch failed: ${err.message}`, 'err');
        setStatus('Fetch failed', 'error');
    }
}

async function deleteFile(title) {
    if (!confirm(`Remove "${title}" from the device?`)) return;
    try {
        setStatus(`Removing...`, 'busy');
        const service = await bleServer.getPrimaryService(SERVICE_UUID);
        const char    = await service.getCharacteristic(DELETE_CHAR_UUID);
        await char.writeValue(new TextEncoder().encode(title));
        log(`Removed: ${title}`, 'ok');
        await new Promise(r => setTimeout(r, 300));
        fetchFiles();
    } catch (err) {
        log(`Remove failed: ${err.message}`, 'err');
        setStatus('Remove failed', 'error');
    }
}

document.getElementById('manageBtn').onclick  = fetchFiles;
document.getElementById('refreshBtn').onclick = fetchFiles;
</script>
