<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLE E-Reader Manager</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f4f4f9; color: #333; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; margin-bottom: 20px; }
        h2 { margin-top: 0; color: #007AFF; }
        button { background: #007AFF; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; margin: 5px; width: calc(100% - 10px); font-weight: 600; transition: opacity 0.2s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        button.secondary { background: #5856D6; }
        button.danger { background: #FF3B30; padding: 6px 12px; width: auto; font-size: 12px; }
        
        .file-list { text-align: left; margin-top: 20px; border-top: 2px solid #eee; padding-top: 15px; display: none; }
        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #f0f0f0; }
        .file-info { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 250px; }
        
        progress { width: 100%; height: 15px; margin-top: 15px; display: none; }
        #status { margin-top: 10px; font-weight: bold; font-size: 14px; color: #555; }
        #log { font-size: 11px; color: #888; margin-top: 15px; text-align: left; width: 100%; overflow-y: auto; max-height: 80px; background: #eee; padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>E-Reader Manager</h2>
    <p style="font-size: 14px; color: #666;">Upload books or manage internal storage.</p>
    
    <!-- Upload Section -->
    <input type="file" id="fileInput" accept=".epub" style="display: none;">
    <button id="selectBtn">1. Select EPUB</button>
    <button id="connectBtn" disabled>2. Connect & Upload</button>
    
    <!-- Management Section -->
    <button id="manageBtn" class="secondary">Manage Existing Files</button>

    <progress id="progressBar" value="0" max="100"></progress>
    <div id="status">Status: Disconnected</div>
    
    <div id="fileListSection" class="file-list">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3 style="margin: 0; font-size: 16px;">Files on Device</h3>
            <button id="refreshBtn" class="secondary" style="width: auto; padding: 5px 10px; font-size: 12px;">Refresh</button>
        </div>
        <div id="fileContainer">
            <!-- Files will appear here -->
        </div>
    </div>

    <div id="log"></div>
</div>

<script>
    let cleanText = "";
    let fileName = "";
    let bleDevice = null;
    let bleServer = null;

    // UUIDs - Match these in your ESP32 code
    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const UPLOAD_CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
    const LIST_CHAR_UUID   = "beb5483e-36e1-4688-b7f5-ea07361b26a9"; // New: For listing files
    const DELETE_CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26aa"; // New: For deleting files

    const log = (msg) => {
        const div = document.getElementById('log');
        div.innerHTML += `> ${msg}<br>`;
        div.scrollTop = div.scrollHeight;
    };

    const setStatus = (msg) => document.getElementById('status').innerText = `Status: ${msg}`;

    // --- 1. EPUB Handling ---
    document.getElementById('selectBtn').onclick = () => document.getElementById('fileInput').click();

    document.getElementById('fileInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        fileName = file.name.replace(".epub", ".txt");
        setStatus("Processing EPUB...");

        try {
            const zip = await JSZip.loadAsync(file);
            let textCollector = "";
            const files = Object.keys(zip.files).filter(fn => fn.endsWith('.xhtml') || fn.endsWith('.html')).sort();

            for (let fn of files) {
                const html = await zip.files[fn].async("string");
                const doc = new DOMParser().parseFromString(html, 'text/html');
                textCollector += doc.body.textContent + "\n\n";
            }

            cleanText = textCollector;
            setStatus(`Ready: ${fileName}`);
            document.getElementById('connectBtn').disabled = false;
            log("EPUB processed successfully.");
        } catch (err) {
            log(`Error: ${err.message}`);
            setStatus("EPUB processing failed.");
        }
    };

    // --- 2. BLE Core ---
    async function ensureConnected() {
        if (bleDevice && bleDevice.gatt.connected) return true;
        
        try {
            setStatus("Requesting Device...");
            bleDevice = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'S3-Reader-BLE' }],
                optionalServices: [SERVICE_UUID]
            });
            
            bleDevice.addEventListener('gattserverdisconnected', () => {
                setStatus("Disconnected");
                document.getElementById('fileListSection').style.display = "none";
            });

            setStatus("Connecting...");
            bleServer = await bleDevice.gatt.connect();
            return true;
        } catch (err) {
            log(`Conn Error: ${err.message}`);
            return false;
        }
    }

    // --- 3. Upload Logic ---
    document.getElementById('connectBtn').onclick = async () => {
        if (!await ensureConnected()) return;

        try {
            const service = await bleServer.getPrimaryService(SERVICE_UUID);
            const characteristic = await service.getCharacteristic(UPLOAD_CHAR_UUID);

            setStatus("Uploading...");
            const prog = document.getElementById('progressBar');
            prog.style.display = "block";
            
            const encoder = new TextEncoder();
            const data = encoder.encode(fileName + "|" + cleanText); // Send filename + content
            const CHUNK_SIZE = 512;

            for (let i = 0; i < data.length; i += CHUNK_SIZE) {
                const chunk = data.slice(i, i + CHUNK_SIZE);
                await characteristic.writeValue(chunk);
                prog.value = Math.round((i / data.length) * 100);
            }

            setStatus("Upload Complete!");
            log("File sent to reader.");
            prog.style.display = "none";
        } catch (err) {
            log(`Upload Error: ${err.message}`);
        }
    };

    // --- 4. Management Logic ---
    async function fetchFiles() {
        if (!await ensureConnected()) return;

        try {
            setStatus("Fetching list...");
            const service = await bleServer.getPrimaryService(SERVICE_UUID);
            const characteristic = await service.getCharacteristic(LIST_CHAR_UUID);
            
            // Read current file list from device
            const value = await characteristic.readValue();
            const decoder = new TextDecoder();
            const listData = decoder.decode(value);
            
            const container = document.getElementById('fileContainer');
            container.innerHTML = "";
            document.getElementById('fileListSection').style.display = "block";

            if (!listData || listData === "") {
                container.innerHTML = "<p style='font-size:12px; color:#999;'>No files found.</p>";
                return;
            }

            const files = listData.split(",");
            files.forEach(file => {
                if (!file.trim()) return;
                const item = document.createElement('div');
                item.className = "file-item";
                item.innerHTML = `
                    <div class="file-info">${file}</div>
                    <button class="danger" onclick="deleteFile('${file}')">Delete</button>
                `;
                container.appendChild(item);
            });
            setStatus("List Updated");
        } catch (err) {
            log(`Fetch Error: ${err.message}`);
        }
    }

    window.deleteFile = async (name) => {
        if (!confirm(`Delete ${name}?`)) return;
        
        try {
            setStatus(`Deleting ${name}...`);
            const service = await bleServer.getPrimaryService(SERVICE_UUID);
            const characteristic = await service.getCharacteristic(DELETE_CHAR_UUID);
            
            const encoder = new TextEncoder();
            await characteristic.writeValue(encoder.encode(name));
            
            log(`Deleted: ${name}`);
            fetchFiles(); // Refresh
        } catch (err) {
            log(`Delete Error: ${err.message}`);
        }
    };

    document.getElementById('manageBtn').onclick = fetchFiles;
    document.getElementById('refreshBtn').onclick = fetchFiles;

</script>

</body>
</html>
